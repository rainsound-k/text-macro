name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            label: macos-arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            label: macos-x64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            label: windows-x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "TextMacro ${{ github.ref_name }}"
          releaseBody: |
            ## 설치 방법

            ### macOS
            - `TextMacro_*_aarch64.dmg` — Apple Silicon (M1/M2/M3)
            - `TextMacro_*_x64.dmg` — Intel Mac

            ### Windows
            - `TextMacro_*_x64-setup.exe` — 설치 마법사
            - `TextMacro_*_x64_en-US.msi` — MSI 인스톨러

            > 처음 실행 시 보안 경고가 뜨면 "추가 정보 → 실행" (Windows) 또는 우클릭 → 열기 (macOS) 를 선택하세요.
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}
