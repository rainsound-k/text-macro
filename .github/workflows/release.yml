name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

# A new push for the same tag cancels an earlier, still-running build.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            label: macos-arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            label: macos-x64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            label: windows-x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      # Set up the self-signed signing identity ourselves. tauri-action's own
      # importer doesn't trust the cert, so `security find-identity -v` wouldn't
      # list it ("failed to resolve signing identity"). We import it AND mark it
      # trusted for code signing, which makes it a valid identity. Signing with
      # the same cert every release keeps the macOS Accessibility permission.
      - name: Set up macOS signing keychain
        if: runner.os == 'macOS'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "${APPLE_CERTIFICATE:-}" ]; then
            echo "No signing secrets set — building unsigned (ad-hoc)."
            exit 0
          fi
          KEYCHAIN="$RUNNER_TEMP/textmacro-signing.keychain-db"
          echo "$APPLE_CERTIFICATE" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" \
            -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN" >/dev/null
          # Trust the self-signed cert for code signing so it's a valid identity.
          # Must use the admin domain (-d) via sudo: a per-user trust change opens
          # a GUI authorization prompt that never returns on a headless runner.
          security find-certificate -c "$APPLE_SIGNING_IDENTITY" -p "$KEYCHAIN" > "$RUNNER_TEMP/cert.cer"
          sudo security add-trusted-cert -d -r trustRoot -p codeSign \
            -k /Library/Keychains/System.keychain "$RUNNER_TEMP/cert.cer"
          # Put our keychain first in the search list so tauri/codesign find it.
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | tr -d '"')
          rm -f "$RUNNER_TEMP/cert.p12" "$RUNNER_TEMP/cert.cer"
          security find-identity -v -p codesigning

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Identity name only — the keychain (with the trusted cert) is already
          # set up above. Passing APPLE_CERTIFICATE here would make tauri-action
          # create its own untrusted keychain and fail to resolve the identity.
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "TextMacro ${{ github.ref_name }}"
          releaseBody: |
            ## 설치 방법

            ### macOS (ZIP 권장)
            - `TextMacro_macos-arm64.zip` — Apple Silicon (M1/M2/M3)
            - `TextMacro_macos-x64.zip` — Intel Mac

            압축을 풀어 **TextMacro.app**을 `응용 프로그램`으로 옮긴 뒤,
            앱을 **우클릭 → 열기**로 한 번 실행하세요.
            (DMG는 macOS Sequoia에서 마운트 경고를 우회하기 어려워 ZIP을 권장합니다.)

            ### Windows
            - `TextMacro_*_x64-setup.exe` — 설치 마법사
            - `TextMacro_*_x64_en-US.msi` — MSI 인스톨러

            > 처음 실행 시 보안 경고가 뜨면 "추가 정보 → 실행" (Windows) 또는 우클릭 → 열기 (macOS) 를 선택하세요.
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}

      # DMG는 macOS Sequoia부터 마운트 시 Gatekeeper 경고를 우회하기 어렵다.
      # .app을 그대로 zip으로 묶어 올리면 사용자는 압축 해제(경고 없음) 후
      # 앱 실행 경고 한 번만 처리하면 된다. ditto로 서명·리소스 포크를 보존한다.
      - name: Package .app as zip (macOS)
        if: runner.os == 'macOS'
        run: |
          set -euo pipefail
          APP_DIR="src-tauri/target/${{ matrix.target }}/release/bundle/macos"
          APP=$(ls -d "$APP_DIR"/*.app | head -n1)
          ZIP="TextMacro_${{ matrix.label }}.zip"
          ditto -c -k --sequesterRsrc --keepParent "$APP" "$ZIP"
          echo "Created $ZIP"

      - name: Upload zip to release (macOS)
        if: runner.os == 'macOS'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          draft: true
          files: TextMacro_${{ matrix.label }}.zip
